apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fin-doc-analyzer.fullname" . }}
  labels:
    {{- include "fin-doc-analyzer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "fin-doc-analyzer.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "fin-doc-analyzer.name" . }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fin-doc-analyzer.fullname" . }}-secrets
                  key: postgres-password
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ include "fin-doc-analyzer.fullname" . }}-secrets
                  key: api-keys
            - name: WEBHOOK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fin-doc-analyzer.fullname" . }}-secrets
                  key: webhook-signing-secret
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
