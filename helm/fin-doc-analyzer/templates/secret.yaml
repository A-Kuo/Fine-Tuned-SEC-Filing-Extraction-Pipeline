apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fin-doc-analyzer.fullname" . }}-secrets
  labels:
    {{- include "fin-doc-analyzer.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.secrets.postgresPassword | quote }}
  api-keys: {{ .Values.secrets.apiKeys | quote }}
  webhook-signing-secret: {{ .Values.secrets.webhookSigningSecret | quote }}
