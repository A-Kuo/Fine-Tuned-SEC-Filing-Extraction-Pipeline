groups:
  - name: findoc-extraction
    rules:
      - alert: ExtractionErrorRateHigh
        expr: |
          rate(findoc_extraction_total{status="error"}[5m])
          /
          rate(findoc_extraction_total[5m]) > 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Extraction error rate > 10%"
          description: "Error rate is {{ $value | humanizePercentage }} over last 5m."

      - alert: ExtractionLatencyHigh
        expr: |
          histogram_quantile(0.99, rate(findoc_extraction_duration_seconds_bucket[5m])) > 1.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p99 latency exceeds 1.2s SLA"
          description: "p99 = {{ $value | humanizeDuration }}"

      - alert: WebhookDeliveryFailing
        expr: |
          rate(findoc_webhook_dispatch_total{status="failed"}[10m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Webhook delivery failures detected"
          description: "Service {{ $labels.service }} is failing."
