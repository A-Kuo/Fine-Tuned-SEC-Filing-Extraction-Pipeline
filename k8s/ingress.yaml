apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: findoc-analyzer
  namespace: findoc-analyzer
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - findoc.example.com
      secretName: findoc-tls
  rules:
    - host: findoc.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: findoc-analyzer
                port:
                  number: 80
